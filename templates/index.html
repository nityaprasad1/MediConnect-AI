<!DOCTYPE html>
<html>
<head>
    <title>MediConnect AI</title>
    <style>
        body { font-family: Arial; background:#f4f6f8; }
        #chat { width:500px; margin:40px auto; background:white; padding:20px; border-radius:10px; }
        #messages { height:350px; overflow-y:auto; border:1px solid #ddd; padding:10px; margin-bottom:10px; }
        .user { color:blue; margin:5px 0; }
        .bot { color:green; margin:5px 0; }
        .triage { font-weight:bold; color:#444; }
        .pharmacy { font-size:14px; color:#555; margin-left:10px; }
        input { width:80%; padding:10px; }
        button { padding:10px; }
    </style>
</head>
<body>
<div id="chat">
    <h2>MediConnect AI</h2>
    <div id="messages"></div>
    <input id="msg" placeholder="Describe your symptoms...">
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    let text = document.getElementById("msg").value;
    if(!text) return;

    let messages = document.getElementById("messages");
    messages.innerHTML += `<div class="user">You: ${text}</div>`;

    let res = await fetch("/chat", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({message:text})
    });

    let data = await res.json();

    messages.innerHTML += `<div class="bot">Bot: ${data.reply}</div>`;
    messages.innerHTML += `<div class="triage">Triage: ${data.triage}</div>`;

    if(data.pharmacies.length){
        messages.innerHTML += `<div>Nearby Pharmacies:</div>`;
        data.pharmacies.forEach(p=>{
            messages.innerHTML += `<div class="pharmacy">${p.name} - ${p.phone}</div>`;
        });
    }

    messages.scrollTop = messages.scrollHeight;
    document.getElementById("msg").value="";
}
</script>
</body>
</html>
